name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build signed test APK
        run: gradle assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p final-apk
          cp app/build/outputs/apk/release/app-release.apk final-apk/Walhero-Live-Wallpaper.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Walhero-Live-Wallpaper-APK
          path: final-apk/Walhero-Live-Wallpaper.apk
